{% extends 'layout.html' %}
{% block title %}创建订单{% endblock %}
{% block body %}
  <div class="content-border">
    <h4>创建订单</h4>
    <form class="form-wrapper" method="post">
        <div class="mb-3 mt-3">
            <label for="url" class="form-label">URL</label>
            <input type="text" class="form-control" id="url" name="url" value="{{ url or ''}}" placeholder="https://example.com">
        </div>
        <div class="mb-3">
            <label for="count" class="form-label">数量</label>
            <input type="text" class="form-control" id="count" name="count" value="{{ count or ''}}" placeholder="请输入需要抓取的次数"></input>
        </div>
    <button type="submit" class="btn btn-primary">提交</button>
    </form>
    </div>
{% endblock %}
