<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>登录</title>
  <style>
    * { box-sizing: border-box; }

    :root{
      --bg: #f4f6fb;
      --card: #ffffff;
      --text: #0f172a;
      --muted: rgba(15,23,42,0.68);
      --border: rgba(15,23,42,0.12);
      --accent: #2563eb;
      --danger: #dc2626;
    }

    body{
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
      background: linear-gradient(180deg, #ffffff, var(--bg));
      color: var(--text);
    }

    .card{
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 22px;
      box-shadow: 0 10px 30px rgba(15,23,42,0.08);
    }

    h1{
      font-size: 22px;
      margin: 0 0 16px;
      text-align: center;
      color: rgba(15,23,42,0.95);
    }

    .field{ margin: 12px 0; }

    label{
      display: block;
      margin-bottom: 6px;
      font-weight: 650;
      color: var(--muted);
      font-size: 14px;
    }

    select, input{
      width: 100%;
      padding: 12px 12px;
      border: 1px solid rgba(15,23,42,0.14);
      border-radius: 12px;
      background: #fff;
      outline: none;
      font-size: 14px;
      color: var(--text);
      transition: border-color .15s ease, box-shadow .15s ease;
    }

    /* 修复 Windows/不同浏览器下 select 默认箭头不居中的问题：禁用系统箭头，自定义 SVG 箭头并固定居中位置 */
    select{
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
      padding-right: 40px; /* 给箭头预留空间 */
      background-image: url("data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20width%3D%2720%27%20height%3D%2720%27%20viewBox%3D%270%200%2020%2020%27%20fill%3D%27none%27%20stroke%3D%27%235b6b83%27%20stroke-width%3D%273%27%20stroke-linecap%3D%27round%27%20stroke-linejoin%3D%27round%27%3E%3Cpolyline%20points%3D%276%208%2010%2012%2014%208%27/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 14px center;
      background-size: 16px 16px;
    }

    select::placeholder, input::placeholder{ color: rgba(15,23,42,0.40); }

    select:focus, input:focus{
      border-color: rgba(37,99,235,0.75);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.16);
    }

    .actions{ margin-top: 16px; }

    button{
      width: 100%;
      padding: 12px 14px;
      border: 1px solid rgba(37,99,235,0.25);
      border-radius: 12px;
      background: var(--accent);
      color: #ffffff;
      cursor: pointer;
      font-size: 15px;
      transition: filter .15s ease, transform .15s ease;
    }

    button:hover{
      filter: brightness(1.02);
      transform: translateY(-1px);
    }

    button:active{ transform: translateY(0); }

    .error{
      margin-top: 12px;
      color: rgba(220,38,38,0.98);
      background: rgba(220,38,38,0.08);
      border: 1px solid rgba(220,38,38,0.22);
      padding: 10px 12px;
      border-radius: 12px;
      font-size: 13px;
      line-height: 1.45;
    }

    .hint{
      margin-top: 10px;
      color: rgba(15,23,42,0.50);
      font-size: 12px;
      text-align: center;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>登录</h1>

    {# 如果你有 login 路由，可以把 action 改成：action="{{ url_for('login') }}" #}
    <form method="post" autocomplete="on" novalidate>
      <div class="field">
        <label for="role">身份</label>
        <select id="role" name="role" required>
          <option value="1" selected>客户</option>
          <option value="2">管理员</option>
        </select>
      </div>

      <div class="field">
        <label for="phone">手机号</label>
        <input
          id="phone"
          type="tel"
          name="phone"
          placeholder="请输入手机号"
          required
          inputmode="tel"
          autocomplete="username"
          pattern="^1[3-9]\\d{9}$"
        />
      </div>

      <div class="field">
        <label for="password">密码</label>
        <input
          id="password"
          type="password"
          name="password"
          placeholder="请输入密码"
          required
          minlength="6"
          autocomplete="current-password"
        />
      </div>

      <div class="actions">
        <button type="submit">提 交</button>
      </div>

      {# 只有 error 有值时才显示，避免空白报错块 #}
      {% if error %}
        <div class="error" role="alert" aria-live="polite">
          错误信息：{{ error }}
        </div>
      {% endif %}
    </form>

    <div class="hint">提示：`role` 的取值需与你后端的角色逻辑一致。</div>
  </main>
</body>
</html>
